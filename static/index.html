<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Technical Interview</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1d1d1f;
    }

    /* ── Shell ─────────────────────────────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 760px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 40px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: calc(100vh - 48px);
      max-height: 880px;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #0066ff, #0040cc);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mic-icon {
      width: 42px; height: 42px;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    header h1 { font-size: 18px; font-weight: 600; }
    header p  { font-size: 13px; opacity: .75; margin-top: 2px; }

    /* ── Stage badge ───────────────────────────────────────────────────────── */
    #stage-badge {
      margin-left: auto;
      background: rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .5px;
      white-space: nowrap;
    }

    /* ── Chat area ─────────────────────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* ── Message bubbles ───────────────────────────────────────────────────── */
    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.55;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

    .bubble.agent {
      background: #f0f0f5;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }

    .bubble.user {
      background: #0066ff;
      color: #fff;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .bubble.system {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
      align-self: center;
      font-size: 13px;
      max-width: 90%;
      text-align: center;
    }

    .bubble.error {
      background: #fde8e8;
      color: #c0392b;
      border: 1px solid #e74c3c;
      align-self: center;
      font-size: 13px;
      max-width: 90%;
    }

    /* ── Typing indicator ──────────────────────────────────────────────────── */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: #f0f0f5;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }

    .typing span {
      width: 8px; height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce .9s infinite;
    }

    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity:.4; }
      40%            { transform: translateY(-6px); opacity:1; }
    }

    /* ── Input row ─────────────────────────────────────────────────────────── */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #e8e8ed;
      background: #fff;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #d1d1d6;
      border-radius: 24px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color .2s;
      max-height: 120px;
      line-height: 1.4;
    }

    #msg:focus { border-color: #0066ff; }
    #msg::placeholder { color: #aaa; }

    #send-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      background: #0066ff;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }

    #send-btn:hover  { background: #0055dd; }
    #send-btn:active { transform: scale(.93); }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* ── Connection status dot ─────────────────────────────────────────────── */
    #conn-status {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff3b30;
      flex-shrink: 0;
      margin-bottom: 19px;
      transition: background .3s;
    }

    #conn-status.connected    { background: #34c759; }
    #conn-status.connecting   { background: #ff9500; }

    /* ── Report modal ──────────────────────────────────────────────────────── */
    #report-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #report-overlay.visible { display: flex; }

    #report-box {
      background: #fff;
      border-radius: 20px;
      max-width: 640px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }

    #report-box h2 { font-size: 22px; margin-bottom: 20px; }

    .score-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 15px;
    }

    .score-row:last-child { border-bottom: none; }

    .score-pill {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .score-pill.high   { background: #d4edda; color: #155724; }
    .score-pill.mid    { background: #fff3cd; color: #856404; }
    .score-pill.low    { background: #fde8e8; color: #721c24; }

    .close-btn {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      background: #0066ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="shell">
  <!-- Header -->
  <header>
    <div class="mic-icon">🎙️</div>
    <div>
      <h1>AI Technical Interview</h1>
      <p id="header-subtitle">Connecting…</p>
    </div>
    <div id="stage-badge">INITIALISING</div>
  </header>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Input -->
  <div class="input-area">
    <div id="conn-status" class="connecting" title="WebSocket status"></div>
    <textarea
      id="msg"
      rows="1"
      placeholder="Type your response…"
      disabled
    ></textarea>
    <button id="send-btn" disabled title="Send">➤</button>
  </div>
</div>

<!-- Report overlay -->
<div id="report-overlay">
  <div id="report-box">
    <h2>📋 Interview Complete</h2>
    <div id="report-content"></div>
    <button class="close-btn" onclick="closeReport()">Close</button>
  </div>
</div>

<script>
  // ── Session identifiers ────────────────────────────────────────────────────
  const SESSION_ID   = crypto.randomUUID();
  const JOB_ID       = "job_001";
  const CANDIDATE_ID = "cand_" + Date.now();

  const WS_URL = `ws://${location.host}/ws/interview/${SESSION_ID}/${JOB_ID}/${CANDIDATE_ID}`;

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const chat       = document.getElementById("chat");
  const msgInput   = document.getElementById("msg");
  const sendBtn    = document.getElementById("send-btn");
  const connDot    = document.getElementById("conn-status");
  const stageBadge = document.getElementById("stage-badge");
  const subtitle   = document.getElementById("header-subtitle");

  let ws;
  let typingEl = null;

  // ── WebSocket Setup ────────────────────────────────────────────────────────
  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      connDot.className = "connected";
      msgInput.disabled  = false;
      sendBtn.disabled   = false;
      subtitle.textContent = `Session ${SESSION_ID.slice(0, 8)}…`;
      msgInput.focus();
    };

    ws.onclose = (e) => {
      connDot.className = "";
      msgInput.disabled  = true;
      sendBtn.disabled   = true;
      addBubble("Connection closed. Refresh the page to start a new session.", "system");
    };

    ws.onerror = () => {
      addBubble("WebSocket error — make sure the backend is running on port 8001.", "error");
    };

    ws.onmessage = (e) => {
      removeTyping();
      let data;
      try { data = JSON.parse(e.data); } catch { data = { message: e.data }; }

      // Update stage badge
      if (data.stage) {
        stageBadge.textContent = data.stage;
      }

      // Show agent message
      const text = data.message || data.response;
      if (text) addBubble(text, "agent");

      // Show system errors
      if (data.error) addBubble(`Error: ${data.error}`, "error");

      // Show final report
      if (data.final_report) renderReport(data.final_report);
    };
  }

  // ── Message helpers ────────────────────────────────────────────────────────
  function addBubble(text, role) {
    const div = document.createElement("div");
    div.className = `bubble ${role}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    if (typingEl) return;
    typingEl = document.createElement("div");
    typingEl.className = "typing";
    typingEl.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(typingEl);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  function send() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    addBubble(text, "user");
    ws.send(text);
    msgInput.value = "";
    msgInput.style.height = "auto";
    showTyping();
  }

  // Auto-grow textarea
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
  });

  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener("click", send);

  function getEvalScore(evaluation, primaryKey, fallbackKey) {
    if (!evaluation || typeof evaluation !== "object") return 0;

    const normalize = (value) => {
      const num = Number(value);
      return Number.isFinite(num) ? num : null;
    };

    const direct = normalize(evaluation[primaryKey]);
    if (direct != null) return direct;

    if (fallbackKey) {
      const fallback = normalize(evaluation[fallbackKey]);
      if (fallback != null) return fallback;
    }

    const details = Array.isArray(evaluation.score_details) ? evaluation.score_details : [];
    const detail = details.find((item) => item && item.dimension === fallbackKey);
    return normalize(detail?.score) ?? 0;
  }

  // ── Report modal ───────────────────────────────────────────────────────────
  function renderReport(report) {
    const box = document.getElementById("report-content");
    const ev  = report.evaluation || {};

    const scores = [
      { label: "Technical Skills",  val: getEvalScore(ev, "technical_score", "technical") },
      { label: "Communication",     val: getEvalScore(ev, "communication_score", "communication") },
      { label: "Problem Solving",   val: getEvalScore(ev, "problem_solving_score", "problem_solving") },
      { label: "Cultural Fit",      val: getEvalScore(ev, "cultural_fit_score", "cultural_fit") },
      { label: "Total Score",       val: getEvalScore(ev, "total_score", "overall_score") },
    ];

    box.innerHTML = `
      <div style="margin-bottom:16px">
        <strong>Recommendation:</strong>
        <span class="score-pill ${pillClass(ev.total_score)}" style="margin-left:8px">
          ${ev.recommendation || "—"}
        </span>
      </div>
      ${scores.map(s => `
        <div class="score-row">
          <span>${s.label}</span>
          <span class="score-pill ${pillClass(s.val)}">${s.val != null ? s.val.toFixed(1) : "—"}</span>
        </div>
      `).join("")}
      <div style="margin-top:16px; font-size:13px; color:#666">
        Bias risk: <strong>${ev.bias_risk || "—"}</strong> &nbsp;|&nbsp;
        Skills found: <strong>${(report.skills || []).length}</strong>
      </div>
    `;

    document.getElementById("report-overlay").classList.add("visible");
  }

  function pillClass(val) {
    if (val == null) return "";
    if (val >= 70)   return "high";
    if (val >= 50)   return "mid";
    return "low";
  }

  function closeReport() {
    document.getElementById("report-overlay").classList.remove("visible");
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
